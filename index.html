<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Prep App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070d1c;--s1:#0f1629;--s2:#141d33;--s3:#1b2540;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#eef2ff;--muted:#6b7a99;
  --accent:#6366f1;--accent2:#818cf8;
  --blue:#3b82f6;--green:#22c55e;--yellow:#f59e0b;--pink:#ec4899;--red:#ef4444;
  --r:14px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

/* orbs */
.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.12;animation:drift 12s ease-in-out infinite}
.o1{width:550px;height:550px;background:#6366f1;top:-180px;left:-180px}
.o2{width:380px;height:380px;background:#3b82f6;bottom:0;right:-120px;animation-delay:4s}
.o3{width:300px;height:300px;background:#ec4899;top:50%;left:35%;animation-delay:8s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(18px,-22px) scale(1.07)}}

#root{position:relative;z-index:1}
.wrap{max-width:800px;margin:0 auto;padding:20px 16px 80px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.4)}50%{box-shadow:0 0 0 9px rgba(99,102,241,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes taskSlide{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes barGlow{0%,100%{opacity:1}50%{opacity:.7}}

.au{animation:fadeUp .5s ease both}
.ad{animation:fadeDown .45s ease both}

/* card */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;transition:border-color .25s,box-shadow .25s}
.card:hover{border-color:var(--border2)}

/* buttons */
.btn{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid var(--border2);background:var(--s2);color:var(--text);font-family:'Inter',sans-serif}
.btn:hover{background:var(--s3);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-p{background:linear-gradient(135deg,var(--accent),#4f46e5);border:none;color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.btn-p:hover{box-shadow:0 6px 22px rgba(99,102,241,.5);transform:translateY(-2px)}
.btn-p:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:8px}
.btn-danger{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:#fca5a5}
.btn-danger:hover{background:rgba(239,68,68,.25)}

/* nav */
.nav-tab{padding:9px 18px;border-radius:40px;font-size:13px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .22s;font-family:'Inter',sans-serif}
.nav-tab:hover{color:var(--text);border-color:var(--border2)}
.nav-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 18px rgba(99,102,241,.4);animation:pulse 3s 1s infinite}
.part-tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.part-tab.active{background:var(--s3);border-color:var(--border2);color:var(--text)}
.part-tab:hover{color:var(--text)}

/* stats */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px 10px;text-align:center;transition:transform .25s,box-shadow .25s,border-color .25s;position:relative;overflow:hidden;cursor:default}
.stat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.1),transparent);opacity:0;transition:opacity .3s}
.stat-card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.4);border-color:var(--border2)}
.stat-card:hover::before{opacity:1}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px}

/* skill bars */
.skill-row{margin-bottom:15px}
.skill-meta{display:flex;justify-content:space-between;margin-bottom:7px;align-items:center}
.skill-name{font-size:13px;color:var(--muted)}
.skill-score{font-size:13px;font-weight:700;font-family:'Space Grotesk',sans-serif}
.bar-wrap{position:relative;height:10px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.bbl{background:linear-gradient(90deg,#3b82f6,#60a5fa);box-shadow:0 0 10px #3b82f660}
.bgr{background:linear-gradient(90deg,#22c55e,#4ade80);box-shadow:0 0 10px #22c55e60}
.byw{background:linear-gradient(90deg,#f59e0b,#fbbf24);box-shadow:0 0 10px #f59e0b60}
.bpk{background:linear-gradient(90deg,#ec4899,#f472b6);box-shadow:0 0 10px #ec489960}

/* tasks */
.task-item{display:flex;align-items:center;gap:12px;padding:12px 8px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s;border-radius:8px;margin-bottom:2px;animation:taskSlide .35s ease both}
.task-item:last-child{border-bottom:none}
.task-item:hover{background:var(--s2);border-bottom-color:transparent}
.task-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s;font-size:12px}
.task-done .task-check{background:var(--green);border-color:var(--green);animation:popIn .3s ease}
.task-text{font-size:14px;transition:all .2s;flex:1}
.task-done .task-text{color:var(--muted);text-decoration:line-through}
.task-tag{font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tag-w{background:rgba(99,102,241,.15);color:var(--accent2)}
.tag-s{background:rgba(236,72,153,.15);color:#f472b6}
.tag-v{background:rgba(245,158,11,.15);color:#fbbf24}
.tag-r{background:rgba(34,197,94,.15);color:#4ade80}
.tag-l{background:rgba(59,130,246,.15);color:#60a5fa}

/* XP badge */
.xp-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(99,102,241,.2);color:var(--accent2);margin-left:8px}

/* tip */
.tip{background:var(--s2);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:16px 18px;margin-bottom:14px}
.tip-lbl{font-size:11px;font-weight:600;letter-spacing:.07em;color:var(--accent2);text-transform:uppercase;margin-bottom:6px}
.tip p{font-size:13px;color:var(--muted);line-height:1.65}

/* qbox */
.qbox{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;font-size:15px;line-height:1.75;white-space:pre-line;color:var(--text)}

/* textarea */
.ta{width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:10px;padding:14px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);resize:vertical;outline:none;margin-top:10px;min-height:170px;transition:border-color .2s}
.ta:focus{border-color:var(--accent)}
.ta::placeholder{color:var(--muted)}

/* feedback */
.feedback{margin-top:14px;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:13px;line-height:1.85;white-space:pre-wrap;color:var(--text);animation:fadeUp .4s ease}

/* flashcard */
.flashcard{background:var(--s2);border:1.5px dashed var(--border2);border-radius:14px;padding:30px 24px;text-align:center;cursor:pointer;min-height:185px;display:flex;flex-direction:column;justify-content:center;margin-bottom:14px;transition:all .3s}
.flashcard:hover{border-color:var(--accent);box-shadow:0 0 22px rgba(99,102,241,.15)}
.fc-word{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.fc-pos{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:14px}
.fc-def{font-size:15px;color:var(--text);line-height:1.6;margin-bottom:10px}
.fc-ex{font-size:13px;color:var(--muted);font-style:italic}

/* chip */
.chip{font-size:12px;padding:4px 11px;border-radius:6px;background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}

/* streak */
.streak-dots{display:flex;gap:7px;margin-top:12px}
.s-dot{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;transition:transform .2s;cursor:default}
.s-dot:hover{transform:scale(1.2)}
.s-on{background:linear-gradient(135deg,var(--yellow),#fbbf24);color:#000}
.s-off{background:rgba(255,255,255,.05);color:var(--muted)}

/* band */
.band-track{height:12px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-bottom:12px;position:relative}
.band-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--blue),var(--green));box-shadow:0 0 16px rgba(99,102,241,.5);transition:width 1.4s cubic-bezier(.22,1,.36,1);position:relative}
.band-lbls{display:flex;justify-content:space-between}
.band-lbls span{font-size:11px;color:var(--muted)}

/* essay */
.essay-entry{border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:14px}
.essay-entry:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.struct-row{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.struct-num{min-width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}

/* timer */
.timer-val{font-family:'Space Grotesk',sans-serif;font-size:54px;font-weight:700;text-align:center;margin-bottom:10px;transition:color .3s}

/* spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}

/* heading */
.sec-h{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin-bottom:14px}
.app-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;background:linear-gradient(90deg,#eef2ff,var(--accent2),#eef2ff);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite}

/* level bar */
.level-bar-wrap{height:6px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-top:4px}
.level-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .8s ease}

/* complete badge */
.done-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;animation:popIn .4s ease}

@media(max-width:600px){.stat-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="bg-mesh"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── TASK POOLS ─────────────────────────────────────────────────────────────
const TASK_POOL = {
  writing:[
    {text:"Write 1 Task 2 essay (250+ words)",xp:30,tag:"tag-w",label:"Writing"},
    {text:"Write 1 Task 1 data description (150+ words)",xp:20,tag:"tag-w",label:"Writing"},
    {text:"Practice paraphrasing the essay topic",xp:10,tag:"tag-w",label:"Writing"},
    {text:"Write an introduction paragraph for any Task 2",xp:15,tag:"tag-w",label:"Writing"},
    {text:"Write a conclusion for an Opinion essay",xp:12,tag:"tag-w",label:"Writing"},
    {text:"Rewrite 3 simple sentences using complex grammar",xp:10,tag:"tag-w",label:"Writing"},
    {text:"Write a body paragraph with example + explanation",xp:15,tag:"tag-w",label:"Writing"},

  ],
  speaking:[
    {text:"Practice 3 Speaking cue cards (Part 2)",xp:25,tag:"tag-s",label:"Speaking"},
    {text:"Record yourself answering 5 Part 1 questions",xp:20,tag:"tag-s",label:"Speaking"},
    {text:"Do a 4-minute Part 3 discussion (record it)",xp:30,tag:"tag-s",label:"Speaking"},
    {text:"Practice 3 Part 1 questions out loud (no notes)",xp:15,tag:"tag-s",label:"Speaking"},
    {text:"Describe your hometown for 2 minutes",xp:15,tag:"tag-s",label:"Speaking"},
    {text:"Use 5 linking phrases in 1 speaking session",xp:12,tag:"tag-s",label:"Speaking"},

    {text:"Use 5 new words in example sentences",xp:12,tag:"tag-v",label:"Vocab"},
    {text:"Learn 5 collocations (e.g. 'make progress')",xp:12,tag:"tag-v",label:"Vocab"},
    {text:"Write 3 Academic Word List words in sentences",xp:10,tag:"tag-v",label:"Vocab"},
    {text:"Study word families for 5 keywords",xp:10,tag:"tag-v",label:"Vocab"},
    {text:"Find synonyms for 5 common IELTS words",xp:10,tag:"tag-v",label:"Vocab"},
  ],
  reading:[
    {text:"Read 1 IELTS passage + answer questions",xp:20,tag:"tag-r",label:"Reading"},
    {text:"Practice True/False/Not Given (10 questions)",xp:20,tag:"tag-r",label:"Reading"},
    {text:"Do a Matching Headings exercise",xp:18,tag:"tag-r",label:"Reading"},
    {text:"Read a BBC article and note 5 new words",xp:15,tag:"tag-r",label:"Reading"},
    {text:"Skim a passage and write the main idea",xp:12,tag:"tag-r",label:"Reading"},
    {text:"Practice Summary Completion (1 passage)",xp:18,tag:"tag-r",label:"Reading"},
    {text:"Time yourself: finish a passage in 20 minutes",xp:20,tag:"tag-r",label:"Reading"},
  ],
  listening:[
    {text:"Listen to a 10-min English podcast (no subtitles)",xp:15,tag:"tag-l",label:"Listening"},
    {text:"Practice IELTS Listening Section 1 exercise",xp:20,tag:"tag-l",label:"Listening"},
    {text:"Watch a TED Talk and take notes",xp:18,tag:"tag-l",label:"Listening"},
    {text:"Do a Multiple Choice listening exercise",xp:20,tag:"tag-l",label:"Listening"},
    {text:"Practice Map/Diagram labelling task",xp:18,tag:"tag-l",label:"Listening"},
    {text:"Listen to British Council IELTS audio x2",xp:15,tag:"tag-l",label:"Listening"},
  ],
};

const SKILL_KEYS=["Listening","Reading","Writing","Speaking"];
const SKILL_CATS={"Listening":"listening","Reading":"reading","Writing":"writing","Speaking":"speaking","Vocab":"vocab"};
const SKILL_BAR_CLS={"Listening":"bbl","Reading":"bgr","Writing":"byw","Speaking":"bpk"};
const SKILL_COLORS={"Listening":"var(--blue)","Reading":"var(--green)","Writing":"var(--yellow)","Speaking":"var(--pink)"};
// XP needed per 0.5 band increase
const XP_PER_LEVEL=50;
// max band 9, starts 0 → mapped to 0-9
const MAX_BAND=9;

const vocabSets={
  general:[
    {word:"Proliferate",pos:"verb",def:"To increase rapidly in numbers.",ex:"Social media platforms have proliferated over the past decade."},
    {word:"Mitigate",pos:"verb",def:"To make less severe or serious.",ex:"We need to mitigate the effects of climate change."},
    {word:"Exacerbate",pos:"verb",def:"To make a bad situation worse.",ex:"The drought exacerbated the food crisis."},
    {word:"Substantial",pos:"adjective",def:"Of considerable importance or size.",ex:"There has been a substantial increase in unemployment."},
    {word:"Inevitable",pos:"adjective",def:"Certain to happen; unavoidable.",ex:"Conflict between the two sides seemed inevitable."},
    {word:"Alleviate",pos:"verb",def:"To make suffering or a problem less severe.",ex:"The government took steps to alleviate poverty."},
    {word:"Contentious",pos:"adjective",def:"Likely to cause argument; controversial.",ex:"Gun control remains a contentious issue."},
    {word:"Pertinent",pos:"adjective",def:"Relevant or applicable to a particular matter.",ex:"She made several pertinent observations."},
    {word:"Predominant",pos:"adjective",def:"Present as the strongest element.",ex:"English is the predominant language of business."},
    {word:"Endeavour",pos:"noun/verb",def:"An attempt to achieve a goal.",ex:"Scientists endeavour to find a cure for the disease."},
  ],
  education:[
    {word:"Curriculum",pos:"noun",def:"The subjects comprising a course of study.",ex:"The school updated its curriculum to include coding."},
    {word:"Pedagogy",pos:"noun",def:"The method and practice of teaching.",ex:"Modern pedagogy focuses on student-centered learning."},
    {word:"Literacy",pos:"noun",def:"The ability to read and write.",ex:"Digital literacy is essential in today's world."},
    {word:"Vocational",pos:"adjective",def:"Relating to skills for a particular job.",ex:"Vocational training helps prepare students for work."},
    {word:"Scholarship",pos:"noun",def:"A grant awarded to support a student's education.",ex:"She received a scholarship to study abroad."},
    {word:"Tuition",pos:"noun",def:"Teaching; the fees paid for education.",ex:"University tuition fees have risen sharply."},
  ],
  environment:[
    {word:"Sustainable",pos:"adjective",def:"Maintained without causing environmental damage.",ex:"We need sustainable energy solutions."},
    {word:"Biodiversity",pos:"noun",def:"The variety of life in a particular ecosystem.",ex:"Deforestation threatens biodiversity."},
    {word:"Emissions",pos:"noun",def:"Gases discharged into the atmosphere.",ex:"Carbon emissions cause global warming."},

    {word:"Renewable",pos:"adjective",def:"Naturally replenished; not depleted when used.",ex:"Solar is a renewable source of energy."},
    {word:"Deforestation",pos:"noun",def:"The clearing of forests on a large scale.",ex:"Deforestation is destroying natural habitats."},
  ],
  technology:[
    {word:"Algorithm",pos:"noun",def:"A set of rules for solving a problem step by step.",ex:"Social media algorithms control what content you see."},
    {word:"Automation",pos:"noun",def:"Using technology to perform tasks with minimal human input.",ex:"Automation is transforming manufacturing."},
    {word:"Innovation",pos:"noun",def:"Introduction of new ideas or products.",ex:"Technological innovation drives economic growth."},
    {word:"Connectivity",pos:"noun",def:"The state of being connected to networks.",ex:"Global connectivity has transformed communication."},
    {word:"Cybersecurity",pos:"noun",def:"Protection of systems from digital attacks.",ex:"Cybersecurity is increasingly important for businesses."},
  ],
  health:[
    {word:"Prevalent",pos:"adjective",def:"Widespread in a particular area or time.",ex:"Obesity is prevalent in many developed countries."},
    {word:"Sedentary",pos:"adjective",def:"Spending much time seated; little physical activity.",ex:"A sedentary lifestyle increases heart disease risk."},
    {word:"Mortality",pos:"noun",def:"Death rate.",ex:"Infant mortality rates have fallen significantly."},
    {word:"Epidemic",pos:"noun",def:"A widespread occurrence of a disease.",ex:"The flu epidemic affected millions last winter."},
    {word:"Wellbeing",pos:"noun",def:"The state of being healthy or happy.",ex:"Mental wellbeing is as important as physical health."},
  ],
};

const speakQs={
  1:["Where are you from and what do you like most about your hometown?","Do you enjoy cooking? Why or why not?","How do you usually spend your weekends?","What kind of music do you enjoy listening to?","Do you prefer watching films at home or at the cinema?","Describe your daily routine.","Do you enjoy reading? What types of books do you like?","What is your favourite season and why?","Do you prefer the city or the countryside?","How do you relax after a busy day?"],
  2:["Describe a time when you helped someone.\n\nYou should say:\n• who you helped\n• what you did to help\n• why you helped them\nand explain how you felt after helping.","Describe a place you visited that you particularly enjoyed.\n\nYou should say:\n• where it was\n• when you went there\n• what you did there\nand explain why you enjoyed it.","Describe an important decision you have made.\n\nYou should say:\n• what the decision was\n• when you made it\n• how you made it\nand explain why it was important.","Describe a person who has had a great influence on your life.\n\nYou should say:\n• who this person is\n• how long you have known them\n• what qualities they have\nand explain why they have influenced you.","Describe a skill you would like to learn.\n\nYou should say:\n• what the skill is\n• why you want to learn it\n• how you would learn it\nand explain how it would help you."],
  3:["Do you think people today are more or less willing to help others than in the past?","How has technology changed the way people communicate?","What role does education play in reducing poverty?","Should governments do more to protect the environment? Why?","How has globalisation affected local cultures?","What are the advantages and disadvantages of living in a big city?","Do you think social media has a positive or negative effect on society?","How important is it for young people to learn foreign languages?"],
};

const writeTopics={

const rand=arr=>arr[Math.floor(Math.random()*arr.length)];
const wc=t=>t.trim()?t.trim().split(/\s+/).length:0;

// XP → Band (0-9, increments of 0.5)
function xpToBand(xp){
  const lvl=Math.floor(xp/XP_PER_LEVEL);
  const band=lvl*0.5;
  return Math.min(band,9);
}
function bandToDisplay(b){return b===0?"0.0":b.toFixed(1)}

async function callClaude(prompt){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]}),
  });
  const d=await res.json();
  return d.content[0].text;
}

const SAVE_URL="http://localhost:5500/save";
const LOAD_URL="http://localhost:5500/load";

// pick random task not recently done from pool category
function pickTask(cat,doneTexts){
  const pool=TASK_POOL[cat]||[];
  const avail=pool.filter(t=>!doneTexts.includes(t.text));
  return avail.length>0?rand(avail):rand(pool);
}

function generateDailyTasks(usedTexts=[]){
  const cats=["writing","speaking","vocab","reading","listening"];
  return cats.map(c=>({...pickTask(c,usedTexts),done:false,id:Date.now()+Math.random()}));
}

// ── Bar component ──
function Bar({pct,cls}){
  const ref=useRef();
  useEffect(()=>{const t=setTimeout(()=>{if(ref.current)ref.current.style.width=pct+'%'},350);return()=>clearTimeout(t)},[pct]);
  return <div className="bar-wrap"><div ref={ref} className={`bar-fill ${cls}`} style={{width:0}}/></div>;
}

// ── Band fill ──
function BandBar({pct}){
  const ref=useRef();
  useEffect(()=>{const t=setTimeout(()=>{if(ref.current)ref.current.style.width=pct+'%'},500);return()=>clearTimeout(t)},[pct]);
  return <div className="band-fill" ref={ref} style={{width:0}}/>;
}

// ── Counter ──
function useCount(target,ms=1000,dec=false,go=true){
  const[v,setV]=useState(0);
  useEffect(()=>{
    if(!go)return;
    let cur=0,step=target/(ms/16);
    const t=setInterval(()=>{cur=Math.min(cur+step,target);setV(dec?+cur.toFixed(1):Math.floor(cur));if(cur>=target)clearInterval(t)},16);
    return()=>clearInterval(t);
  },[target,go]);
  return v;
}

                    `You are an IELTS examiner. Evaluate this Writing Task ${writeTask} response.\nTask: "${writeQ[writeTask]}"\nStudent response: "${text}"\nProvide:\nBAND SCORES:\n- Task Achievement: X/9\n- Coherence & Cohesion: X/9\n- Lexical Resource: X/9\n- Grammatical Range: X/9\n- Overall Band: X/9\n\nSTRENGTHS (2 points):\n•\n•\n\nIMPROVEMENTS (2 points):\n•\n•\n\nCORRECTED SENTENCE:\n\nBETTER VOCABULARY (2 suggestions):\n\nStudent is B1 level targeting Band 6. Be encouraging and specific.`);
                }}>
                {loading[`w${writeTask}`]?<><span className="spinner"/>Tekshirilmoqda...</>:"🤖 AI tekshirish"}
              </button>
            </div>
          </div>
          {feedback[`w${writeTask}`]&&<div className="feedback">{feedback[`w${writeTask}`]}</div>}
        </div>

        {writeTask===2&&(
          <div className="card au" style={{animationDelay:".1s"}}>
            <div className="sec-h">🏗️ Esse tuzilmasi</div>
            {[
              {l:"Kirish",d:"Mavzuni qayta ifodalang + fikringizni bildiring (2-3 jumla)"},
              {l:"1-qism",d:"Asosiy fikr + tushuntirish + misol (4-5 jumla)"},
              {l:"2-qism",d:"Ikkinchi fikr + tushuntirish + misol (4-5 jumla)"},
              {l:"Xulosa",d:"Fikringizni qayta ayting + yakuniy mulohaza (2 jumla)"},
            ].map((s,i)=>(
              <div key={i} className="struct-row">
                <div className="struct-num">{i+1}</div>
                <div><div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{s.l}</div>
                <div style={{fontSize:12,color:"var(--muted)"}}>{s.d}</div></div>
              </div>
            ))}
          </div>
        )}
      </>}

      {/* ─── VOCABULARY ─── */}
      {tab==="vocabulary"&&<>
        <div className="card au">
          <div className="sec-h">🃏 Flashcardlar — bosib ta'rifni ko'ring</div>
          <div className="flashcard" onClick={reveal} key={vocabCat+vocabIdx}>
            <div className="fc-word">{vcur.word}</div>
            <div className="fc-pos">{vcur.pos}</div>
            {!revealed&&<div style={{fontSize:13,color:"var(--muted)"}}>👆 Ta'rifni ko'rish uchun bosing</div>}
            {revealed&&<><div className="fc-def">{vcur.def}</div><div className="fc-ex">"{vcur.ex}"</div></>}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <button className="btn btn-sm" onClick={prevV}>← Oldingi</button>
            <span style={{fontSize:13,color:"var(--muted)"}}>{vocabIdx+1} / {vset.length}</span>
            <button className="btn btn-sm" onClick={nextV}>Keyingi →</button>
          </div>
        </div>

        <div className="card au" style={{animationDelay:".1s"}}>
          <div className="sec-h">📂 Kategoriyalar</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {[["general","🌐 General"],["education","📖 Ta'lim"],["environment","🌿 Muhit"],["technology","💻 Texnologiya"],["health","❤️ Salomatlik"]].map(([c,l])=>(
              <button key={c} className={`part-tab${vocabCat===c?" active":""}`} onClick={()=>changeCat(c)}>{l}</button>
            ))}
          </div>
        </div>

        <div className="card au" style={{animationDelay:".18s"}}>
          <div className="sec-h">📈 O'rganilgan: <span style={{color:"var(--green)"}}>{learned.length}</span> ta so'z</div>
          {learned.length===0
            ?<div style={{fontSize:13,color:"var(--muted)"}}>Flashcardni ochib ko'ring — so'zlar shu yerda saqlanadi.</div>
            :<div style={{display:"flex",flexWrap:"wrap",gap:7}}>{learned.map(w=><span key={w} className="chip">{w}</span>)}</div>
          }
        </div>
      </>}

      {/* ─── HISTORY ─── */}
      {tab==="history"&&<>
        <div className="sec-h ad" style={{fontSize:18,marginBottom:16}}>📁 Tarix & Statistika</div>

        <div className="card au">
          <div className="sec-h">📊 Ko'nikma statistikasi</div>
          {SKILL_KEYS.map(k=>{
            const band=bands[k],xp=skillXp[k]||0;
            return(
              <div key={k} className="skill-row">
                <div className="skill-meta">
                  <span className="skill-name">{k}</span>
                  <span className="skill-score" style={{color:SKILL_COLORS[k]}}>{band===0?"0.0":band.toFixed(1)}<span className="xp-badge">{xp} XP</span></span>
                </div>
                <Bar pct={band===0?0:(band/9)*100} cls={SKILL_BAR_CLS[k]}/>
              </div>
            );
          })}
        </div>

        <div className="card au" style={{animationDelay:".08s"}}>
          <div className="sec-h">🏆 Umumiy ko'rsatkichlar</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[
              {l:"Jami bajarilgan vazifalar",v:todayDone},
              {l:"O'rganilgan so'zlar",v:learned.length},
              {l:"Saqlangan essalar",v:(writeSaved[1]||[]).length+(writeSaved[2]||[]).length},
              {l:"Streak",v:`${streak} kun 🔥`},
              {l:"Jami XP",v:totalXp},
              {l:"Overall Band",v:overallBand===0?"0.0":overallBand.toFixed(1)},
            ].map(m=>(
              <div key={m.l} style={{background:"var(--s2)",borderRadius:10,padding:14}}>
                <div style={{fontSize:11,color:"var(--muted)",marginBottom:5}}>{m.l}</div>
                <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:26,fontWeight:700,color:"var(--accent2)"}}>{m.v}</div>
              </div>
            ))}
          </div>
        </div>

        {[1,2].map(t=>(
          <div key={t} className="card au" style={{animationDelay:`${.15+t*.08}s`}}>
            <div className="sec-h">Task {t} essalari <span style={{fontSize:12,color:"var(--muted)",fontWeight:400}}>({(writeSaved[t]||[]).length} ta)</span></div>
            {(writeSaved[t]||[]).length===0
              ?<div style={{fontSize:13,color:"var(--muted)"}}>Hali esse saqlanmagan.</div>
              :(writeSaved[t]||[]).map((e,i)=>(
                <div key={i} className="essay-entry">
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontSize:12,color:"var(--muted)"}}>{e.date}</span>
                    <span className="chip" style={{fontSize:11,padding:"2px 8px"}}>{e.wc} so'z</span>
                  </div>
                  <div style={{fontSize:12,color:"var(--muted)",marginBottom:6}}>{e.topic}</div>
                  <div style={{fontSize:13,color:"var(--text)",lineHeight:1.6,background:"var(--s2)",borderRadius:8,padding:10,maxHeight:100,overflow:"auto"}}>{e.text}</div>
                </div>
              ))
            }
          </div>
        ))}
      </>}

    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
