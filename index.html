<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Prep App</title>
<meta name="description" content="IELTS ga tayyorlanish uchun bepul ilova - Speaking, Writing, Vocabulary">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F3F4F6; min-height: 100vh; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f1f1; } ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const STORAGE_KEY = "ielts_progress_v1";

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { return {}; }
}
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); return true; } catch { return false; }
}

const vocabSets = {
  general: [
    { word:"Proliferate", pos:"verb", def:"To increase rapidly in numbers.", ex:"Social media platforms have proliferated over the past decade." },
    { word:"Mitigate", pos:"verb", def:"To make less severe or serious.", ex:"We need to mitigate the effects of climate change." },
    { word:"Exacerbate", pos:"verb", def:"To make a bad situation worse.", ex:"The drought exacerbated the food crisis." },
    { word:"Substantial", pos:"adjective", def:"Of considerable importance or size.", ex:"There has been a substantial increase in unemployment." },
    { word:"Inevitable", pos:"adjective", def:"Certain to happen; unavoidable.", ex:"Conflict between the two sides seemed inevitable." },
    { word:"Alleviate", pos:"verb", def:"To make suffering or a problem less severe.", ex:"The government took steps to alleviate poverty." },
    { word:"Contentious", pos:"adjective", def:"Likely to cause argument; controversial.", ex:"Gun control remains a contentious issue." },
    { word:"Pertinent", pos:"adjective", def:"Relevant or applicable to a particular matter.", ex:"She made several pertinent observations." },
    { word:"Predominant", pos:"adjective", def:"Present as the strongest element.", ex:"English is the predominant language of business." },
    { word:"Endeavour", pos:"noun/verb", def:"An attempt to achieve a goal.", ex:"Scientists endeavour to find a cure for the disease." },
  ],
  education: [
    { word:"Curriculum", pos:"noun", def:"The subjects comprising a course of study.", ex:"The school updated its curriculum to include coding." },
    { word:"Pedagogy", pos:"noun", def:"The method and practice of teaching.", ex:"Modern pedagogy focuses on student-centered learning." },
    { word:"Literacy", pos:"noun", def:"The ability to read and write; competence in an area.", ex:"Digital literacy is essential in today's world." },
    { word:"Vocational", pos:"adjective", def:"Relating to skills for a particular job.", ex:"Vocational training helps prepare students for work." },
    { word:"Scholarship", pos:"noun", def:"A grant awarded to support a student's education.", ex:"She received a scholarship to study abroad." },
    { word:"Tuition", pos:"noun", def:"Teaching or the fees paid for education.", ex:"University tuition fees have risen sharply." },
    { word:"Discipline", pos:"noun", def:"A branch of knowledge; controlled behaviour.", ex:"Mathematics is a core academic discipline." },
  ],
  environment: [
    { word:"Sustainable", pos:"adjective", def:"Maintained without causing environmental damage.", ex:"We need sustainable energy solutions." },
    { word:"Biodiversity", pos:"noun", def:"The variety of life in a particular ecosystem.", ex:"Deforestation threatens biodiversity." },
    { word:"Emissions", pos:"noun", def:"Gases discharged into the atmosphere.", ex:"Carbon emissions are the main cause of global warming." },
    { word:"Conservation", pos:"noun", def:"Preserving the natural environment.", ex:"Wildlife conservation has saved many species." },
    { word:"Renewable", pos:"adjective", def:"Naturally replenished; not depleted when used.", ex:"Solar is a renewable source of energy." },
    { word:"Deforestation", pos:"noun", def:"The clearing of forests on a large scale.", ex:"Deforestation is destroying natural habitats." },
    { word:"Carbon footprint", pos:"noun", def:"Total greenhouse gas emissions caused by a person.", ex:"We should all try to reduce our carbon footprint." },
  ],
  technology: [
    { word:"Algorithm", pos:"noun", def:"A set of rules for solving a problem step by step.", ex:"Social media algorithms control what content you see." },
    { word:"Automation", pos:"noun", def:"Using technology to perform tasks with minimal human input.", ex:"Automation is transforming manufacturing." },
    { word:"Innovation", pos:"noun", def:"Introduction of new ideas or products.", ex:"Technological innovation drives economic growth." },
    { word:"Connectivity", pos:"noun", def:"The state of being connected to networks.", ex:"Global connectivity has transformed communication." },
    { word:"Cybersecurity", pos:"noun", def:"Protection of systems from digital attacks.", ex:"Cybersecurity is increasingly important for businesses." },
    { word:"Artificial intelligence", pos:"noun", def:"Machines simulating human intelligence.", ex:"Artificial intelligence is changing many industries." },
  ],
  health: [
    { word:"Prevalent", pos:"adjective", def:"Widespread in a particular area or time.", ex:"Obesity is prevalent in many developed countries." },
    { word:"Sedentary", pos:"adjective", def:"Spending much time seated; little physical activity.", ex:"A sedentary lifestyle increases the risk of heart disease." },
    { word:"Mortality", pos:"noun", def:"Death rate.", ex:"Infant mortality rates have fallen significantly." },
    { word:"Epidemic", pos:"noun", def:"A widespread occurrence of a disease.", ex:"The flu epidemic affected millions last winter." },
    { word:"Wellbeing", pos:"noun", def:"The state of being healthy or happy.", ex:"Mental wellbeing is as important as physical health." },
    { word:"Chronic", pos:"adjective", def:"Persisting for a long time or constantly recurring.", ex:"Chronic stress can lead to serious health problems." },
  ],
};

const speakQs = {
  1: ["Where are you from and what do you like most about your hometown?","Do you enjoy cooking? Why or why not?","How do you usually spend your weekends?","What kind of music do you enjoy listening to?","Do you prefer watching films at home or at the cinema?","Describe your daily routine.","Do you enjoy reading? What types of books do you like?"],
  2: ["Describe a time when you helped someone.\n\nYou should say:\n- who you helped\n- what you did to help\n- why you helped them\nand explain how you felt after helping.","Describe a place you visited that you particularly enjoyed.\n\nYou should say:\n- where it was\n- when you went there\n- what you did there\nand explain why you enjoyed it.","Describe an important decision you have made.\n\nYou should say:\n- what the decision was\n- when you made it\n- how you made it\nand explain why it was important.","Describe a person who has had a great influence on your life.\n\nYou should say:\n- who this person is\n- how long you have known them\n- what qualities they have\nand explain why they have influenced you so much."],
  3: ["Do you think people today are more or less willing to help others than in the past?","How has technology changed the way people communicate?","What role does education play in reducing poverty?","Should governments do more to protect the environment? Why?","How has globalisation affected local cultures?","What are the advantages and disadvantages of living in a big city?"],
};

const writeTopics = {
  1: ["The graph below shows the percentage of people using the internet in three countries between 2000 and 2020. Summarise the information and make comparisons where relevant.","The chart shows the main reasons why people chose to use public transport in 2022. Summarise the information by selecting and reporting the main features.","The table below shows employment rates in four countries over three different years. Summarise the information and make comparisons where relevant."],
  2: ["Some people believe that technology has made our lives more complicated. To what extent do you agree or disagree?","Many people think governments should provide free education at all levels. Do you agree or disagree?","Some argue the best way to reduce crime is longer prison sentences. Others believe there are better ways. Discuss both views and give your own opinion.","The growing number of cars in cities is causing serious problems. What are these problems and what measures could reduce traffic?","Some people think children should begin learning a foreign language at primary school. Others think it is better to start later. Discuss both views."],
};

const rand = arr => arr[Math.floor(Math.random() * arr.length)];
const wc = t => t.trim() ? t.trim().split(/\s+/).length : 0;

async function callClaude(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000, messages:[{ role:"user", content:prompt }] }),
  });
  const data = await res.json();
  return data.content[0].text;
}

function App() {
  const saved = loadData();
  const [tab, setTab] = useState("dashboard");
  const [speakPart, setSpeakPart] = useState(1);
  const [writeTask, setWriteTask] = useState(2);
  const [speakQ, setSpeakQ] = useState({ 1:speakQs[1][0], 2:speakQs[2][0], 3:speakQs[3][0] });
  const [writeQ, setWriteQ] = useState({ 1:writeTopics[1][0], 2:writeTopics[2][0] });
  const [writeText, setWriteText] = useState({ 1:"", 2:"" });
  const [writeSaved, setWriteSaved] = useState(saved.writeSaved || { 1:[], 2:[] });
  const [feedback, setFeedback] = useState({});
  const [loading, setLoading] = useState({});
  const [vocabCat, setVocabCat] = useState("general");
  const [vocabIdx, setVocabIdx] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const [learned, setLearned] = useState(saved.learned || []);
  const [tasks, setTasks] = useState(saved.tasks || [false,false,false,false]);
  const [totalTasks, setTotalTasks] = useState(saved.totalTasks || 0);
  const [streak, setStreak] = useState(saved.streak || 1);
  const [timer, setTimer] = useState(60);
  const [timerOn, setTimerOn] = useState(false);
  const [saveStatus, setSaveStatus] = useState("");
  const timerRef = useRef(null);

  const persist = useCallback((extra = {}) => {
    const ok = saveData({ learned, writeSaved, tasks, totalTasks, streak, ...extra });
    setSaveStatus(ok ? "Saqlandi!" : "Xato!");
    setTimeout(() => setSaveStatus(""), 2000);
  }, [learned, writeSaved, tasks, totalTasks, streak]);

  useEffect(() => {
    if (timerOn && timer > 0) timerRef.current = setTimeout(() => setTimer(t => t-1), 1000);
    else if (timer === 0) setTimerOn(false);
    return () => clearTimeout(timerRef.current);
  }, [timerOn, timer]);

  const vset = vocabSets[vocabCat];
  const vcur = vset[vocabIdx];
  const tasksDone = tasks.filter(Boolean).length;
  const fmt = `${Math.floor(timer/60)}:${String(timer%60).padStart(2,"0")}`;

  const reveal = () => {
    const newLearned = (!revealed && !learned.includes(vcur.word)) ? [...learned, vcur.word] : learned;
    if (!revealed && !learned.includes(vcur.word)) { setLearned(newLearned); persist({ learned: newLearned }); }
    setRevealed(r => !r);
  };
  const nextV = () => { setVocabIdx(i => (i+1) % vset.length); setRevealed(false); };
  const prevV = () => { setVocabIdx(i => (i-1+vset.length) % vset.length); setRevealed(false); };
  const changeCat = c => { setVocabCat(c); setVocabIdx(0); setRevealed(false); };

  const toggleTask = i => {
    const next = [...tasks]; next[i] = !next[i];
    const newTotal = totalTasks + (next[i] ? 1 : 0);
    setTasks(next); setTotalTasks(newTotal);
    persist({ tasks: next, totalTasks: newTotal });
  };

  const saveEssay = taskNum => {
    const text = writeText[taskNum];
    if (!text.trim()) return;
    const entry = { date: new Date().toLocaleDateString("en-GB"), topic: writeQ[taskNum].slice(0,60)+"...", text, wc: wc(text) };
    const next = { ...writeSaved, [taskNum]: [entry, ...(writeSaved[taskNum]||[])].slice(0,10) };
    setWriteSaved(next);
    persist({ writeSaved: next });
    setSaveStatus("Esse saqlandi!");
    setTimeout(() => setSaveStatus(""), 2500);
  };

  const doFeedback = async (key, prompt) => {
    setLoading(l => ({...l,[key]:true}));
    setFeedback(f => ({...f,[key]:""}));
    try {
      const r = await callClaude(prompt);
      setFeedback(f => ({...f,[key]:r}));
    } catch {
      setFeedback(f => ({...f,[key]:"AI ga ulanib bolmadi. Internetni tekshiring."}));
    }
    setLoading(l => ({...l,[key]:false}));
  };

  const S = {
    wrap: { maxWidth:700, margin:"0 auto", padding:"16px 14px" },
    card: { background:"#fff", border:"1px solid #E5E7EB", borderRadius:14, padding:16, marginBottom:14 },
    navBtn: a => ({ padding:"8px 14px", borderRadius:20, border:`1.5px solid ${a?"#111":"#E5E7EB"}`, background:a?"#111":"#fff", color:a?"#fff":"#374151", fontSize:13, cursor:"pointer", fontWeight:a?600:400 }),
    pBtn: a => ({ padding:"6px 14px", borderRadius:8, border:`1.5px solid ${a?"#111":"#E5E7EB"}`, background:a?"#111":"#fff", color:a?"#fff":"#374151", fontSize:13, cursor:"pointer", fontWeight:a?600:400 }),
    btn: (p,d) => ({ padding:"8px 16px", borderRadius:8, border:p?"none":"1px solid #E5E7EB", background:d?"#E5E7EB":p?"#111":"#fff", color:p?"#fff":"#374151", fontSize:13, cursor:d?"default":"pointer", fontWeight:p?600:400 }),
    sm: { padding:"6px 12px", borderRadius:8, border:"1px solid #E5E7EB", background:"#fff", fontSize:12, cursor:"pointer" },
    ta: { width:"100%", border:"1.5px solid #E5E7EB", borderRadius:10, padding:12, fontSize:14, fontFamily:"inherit", resize:"vertical", outline:"none", marginTop:10, minHeight:160 },
    fb: { marginTop:14, background:"#F9FAFB", borderRadius:10, padding:14, fontSize:13, lineHeight:1.8, whiteSpace:"pre-wrap", color:"#1F2937" },
    q: { background:"#F9FAFB", borderRadius:10, padding:14, marginBottom:14, fontSize:15, lineHeight:1.8, whiteSpace:"pre-line" },
  };

  return (
    <div style={S.wrap}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div>
          <div style={{ fontSize:22, fontWeight:700 }}>IELTS Prep</div>
          <div style={{ fontSize:13, color:"#9CA3AF" }}>B1 dan Band 6.5 ga</div>
        </div>
        <div style={{ fontSize:12, color:saveStatus?"#10B981":"#9CA3AF", textAlign:"right" }}>
          {saveStatus || "Avtosaqlash yoqiq"}<br/>
          <span style={{ fontSize:11, color:"#D1D5DB" }}>brauzerda saqlanadi</span>
        </div>
      </div>

      <div style={{ display:"flex", gap:6, marginBottom:20, flexWrap:"wrap" }}>
        {[["dashboard","Dashboard"],["speaking","Speaking"],["writing","Writing"],["vocabulary","Vocabulary"],["history","Tarix"]].map(([id,l]) => (
          <button key={id} onClick={() => setTab(id)} style={S.navBtn(tab===id)}>{l}</button>
        ))}
      </div>

      {/* DASHBOARD */}
      {tab==="dashboard" && <>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:16 }}>
          {[{l:"Overall",v:"5.5"},{l:"Streak",v:streak},{l:"Tasks",v:totalTasks},{l:"Words",v:learned.length}].map(m => (
            <div key={m.l} style={{ background:"#fff", border:"1px solid #F3F4F6", borderRadius:12, padding:"14px 8px", textAlign:"center" }}>
              <div style={{ fontSize:24, fontWeight:700 }}>{m.v}</div>
              <div style={{ fontSize:11, color:"#9CA3AF", marginTop:2 }}>{m.l}</div>
            </div>
          ))}
        </div>

        <div style={S.card}>
          <div style={{ fontWeight:600, marginBottom:14 }}>Skill Progress</div>
          {[{n:"Listening",v:5.5,p:55,c:"#3B82F6"},{n:"Reading",v:6.0,p:60,c:"#10B981"},{n:"Writing",v:4.5,p:48,c:"#F59E0B"},{n:"Speaking",v:5.0,p:50,c:"#EC4899"}].map(s => (
            <div key={s.n} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
              <span style={{ fontSize:13, color:"#6B7280", width:80 }}>{s.n}</span>
              <div style={{ flex:1, height:7, background:"#F3F4F6", borderRadius:4 }}>
                <div style={{ width:`${s.p}%`, height:"100%", background:s.c, borderRadius:4 }} />
              </div>
              <span style={{ fontSize:13, fontWeight:600, width:28, textAlign:"right" }}>{s.v}</span>
            </div>
          ))}
        </div>

        <div style={S.card}>
          <div style={{ fontWeight:600, marginBottom:12 }}>Bugungi vazifalar</div>
          {["Write 1 Task 2 essay (250 words)","Practice 3 Speaking cue cards","Learn 10 new vocabulary words","Read 1 IELTS passage"].map((t,i) => (
            <label key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0", cursor:"pointer", fontSize:14, borderBottom:i<3?"1px solid #F9FAFB":"none" }}>
              <input type="checkbox" checked={tasks[i]} onChange={() => toggleTask(i)} />
              <span style={{ textDecoration:tasks[i]?"line-through":"none", color:tasks[i]?"#9CA3AF":"#111" }}>{t}</span>
            </label>
          ))}
        </div>

        <div style={{ background:"#EFF6FF", borderLeft:"3px solid #3B82F6", borderRadius:"0 10px 10px 0", padding:"12px 16px" }}>
          <div style={{ fontSize:12, fontWeight:700, color:"#1D4ED8", marginBottom:4 }}>Kun maslahati</div>
          <div style={{ fontSize:13, color:"#1E40AF", lineHeight:1.6 }}>Har kuni 15 daqiqa inglizcha fikrlarni baland ovozda ayting — Speaking fluency tez oshadi!</div>
        </div>
      </>}

      {/* SPEAKING */}
      {tab==="speaking" && <>
        <div style={{ display:"flex", gap:8, marginBottom:16 }}>
          {[1,2,3].map(p => <button key={p} onClick={() => setSpeakPart(p)} style={S.pBtn(speakPart===p)}>Part {p}</button>)}
        </div>
        <div style={S.card}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ fontWeight:600 }}>{["","Personal Questions","Cue Card","Discussion"][speakPart]}</div>
            <span style={{ fontSize:11, padding:"3px 8px", borderRadius:10, fontWeight:600, background:speakPart===1?"#EFF6FF":speakPart===2?"#FEF3C7":"#FEF2F2", color:speakPart===1?"#1D4ED8":speakPart===2?"#B45309":"#991B1B" }}>
              {speakPart===2?"2 min":"4-5 min"}
            </span>
          </div>
          <div style={S.q}>{speakQ[speakPart]}</div>
          {speakPart===2 && <div style={{ textAlign:"center", marginBottom:14 }}>
            <div style={{ fontSize:13, color:"#6B7280", marginBottom:4 }}>Preparation time:</div>
            <div style={{ fontSize:40, fontWeight:700, marginBottom:8, color:timer<10?"#EF4444":"#111" }}>{fmt}</div>
            <div style={{ display:"flex", gap:8, justifyContent:"center" }}>
              <button onClick={() => { setTimer(60); setTimerOn(true); }} style={S.sm}>Start (1 min)</button>
              <button onClick={() => { setTimerOn(false); setTimer(60); }} style={S.sm}>Reset</button>
            </div>
          </div>}
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            <button onClick={() => { setSpeakQ(q=>({...q,[speakPart]:rand(speakQs[speakPart])})); setFeedback(f=>({...f,[`s${speakPart}`]:""})); }} style={S.btn(false,false)}>Yangi savol</button>
            <button disabled={loading[`s${speakPart}`]} onClick={() => doFeedback(`s${speakPart}`,`You are an IELTS Speaking examiner. Student (B1 level, targeting Band 6) is practising Part ${speakPart}.\nQuestion: "${speakQ[speakPart]}"\nProvide:\n1. Sample Band 6-7 answer (3-5 sentences)\n2. Key vocabulary (4 words + short meanings)\n3. One grammar tip\n4. Band descriptor reminder\nBe concise and encouraging.`)} style={S.btn(true,loading[`s${speakPart}`])}>
              {loading[`s${speakPart}`]?"Yuklanmoqda...":"AI Feedback"}
            </button>
          </div>
          {feedback[`s${speakPart}`] && <div style={S.fb}>{feedback[`s${speakPart}`]}</div>}
        </div>
        <div style={S.card}>
          <div style={{ fontWeight:600, marginBottom:8 }}>Part {speakPart} Maslahatlar</div>
          <div style={{ fontSize:13, color:"#6B7280", lineHeight:1.7 }}>
            {speakPart===1 && "2-3 jumlali javob bering. Bog'lovchilar: well, actually, to be honest, personally. Hech qachon bir so'zli javob bermang."}
            {speakPart===2 && "1 daqiqali tayyorgarlikda barcha nuqtalar bo'yicha eslatmalar yozing. To'liq 2 daqiqa gapirishga harakat qiling."}
            {speakPart===3 && "Fikrlaringizni asoslab bering. Ishlating: In my view, It depends on, On the other hand, Arguably."}
          </div>
        </div>
      </>}

      {/* WRITING */}
      {tab==="writing" && <>
        <div style={{ display:"flex", gap:8, marginBottom:16 }}>
          {[1,2].map(t => <button key={t} onClick={() => setWriteTask(t)} style={S.pBtn(writeTask===t)}>Task {t} {t===1?"(150+)":"(250+)"}</button>)}
        </div>
        <div style={S.card}>
          <div style={{ fontWeight:600, marginBottom:10 }}>{writeTask===1?"Data Description":"Essay"}</div>
          <div style={{ background:"#F9FAFB", borderRadius:10, padding:14, fontSize:14, lineHeight:1.6, marginBottom:10 }}>{writeQ[writeTask]}</div>
          <button onClick={() => { setWriteQ(q=>({...q,[writeTask]:rand(writeTopics[writeTask])})); setFeedback(f=>({...f,[`w${writeTask}`]:""})); }} style={{ ...S.sm, marginBottom:10 }}>Yangi mavzu</button>
          <textarea value={writeText[writeTask]} onChange={e => setWriteText(p=>({...p,[writeTask]:e.target.value}))} placeholder={`Task ${writeTask} javobingizni shu yerga yozing... (kamida ${writeTask===1?150:250} so'z)`} style={S.ta} />
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:10, flexWrap:"wrap", gap:8 }}>
            <span style={{ fontSize:13, color:wc(writeText[writeTask])>=(writeTask===1?150:250)?"#10B981":"#9CA3AF" }}>
              Soz: {wc(writeText[writeTask])} {wc(writeText[writeTask])>=(writeTask===1?150:250)?"(yetarli)":`/ ${writeTask===1?150:250} kerak`}
            </span>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => saveEssay(writeTask)} style={S.sm}>Esse saqlash</button>
              <button disabled={loading[`w${writeTask}`]} onClick={() => {
                const text = writeText[writeTask];
                if (!text||wc(text)<10){ setFeedback(f=>({...f,[`w${writeTask}`]:"Koprok yozing."})); return; }
                doFeedback(`w${writeTask}`,`You are an IELTS examiner. Evaluate this Writing Task ${writeTask} response.\nTask: "${writeQ[writeTask]}"\nStudent response: "${text}"\nProvide:\nBAND SCORES:\n- Task Achievement: X/9\n- Coherence & Cohesion: X/9\n- Lexical Resource: X/9\n- Grammatical Range: X/9\n- Overall Band: X/9\n\nSTRENGTHS (2 points):\n*\n*\n\nIMPROVEMENTS (2 points):\n*\n*\n\nCORRECTED SENTENCE:\n\nBETTER VOCABULARY (2):\n\nStudent is B1 targeting Band 6. Be encouraging.`);
              }} style={S.btn(true,loading[`w${writeTask}`])}>
                {loading[`w${writeTask}`]?"Tekshirilmoqda...":"AI bilan tekshirish"}
              </button>
            </div>
          </div>
          {feedback[`w${writeTask}`] && <div style={S.fb}>{feedback[`w${writeTask}`]}</div>}
        </div>
        {writeTask===2 && <div style={S.card}>
          <div style={{ fontWeight:600, marginBottom:10 }}>Esse tuzilmasi</div>
          {[{l:"Kirish",d:"Mavzuni qayta ifodalang + fikringizni bildiring (2-3 jumla)"},
            {l:"1-qism",d:"Asosiy fikr + tushuntirish + misol (4-5 jumla)"},
            {l:"2-qism",d:"Ikkinchi fikr + tushuntirish + misol (4-5 jumla)"},
            {l:"Xulosa",d:"Fikringizni qayta ayting + yakuniy mulohaza (2 jumla)"},
          ].map((s,i) => (
            <div key={i} style={{ display:"flex", gap:10, marginBottom:10 }}>
              <div style={{ minWidth:24,height:24,borderRadius:"50%",background:"#111",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0 }}>{i+1}</div>
              <div><div style={{ fontSize:13,fontWeight:600 }}>{s.l}</div><div style={{ fontSize:12,color:"#6B7280" }}>{s.d}</div></div>
            </div>
          ))}
        </div>}
      </>}

      {/* VOCABULARY */}
      {tab==="vocabulary" && <>
        <div style={S.card}>
          <div style={{ fontWeight:600, marginBottom:14 }}>Flashcardlar — bosing</div>
          <div onClick={reveal} style={{ background:"#F9FAFB",borderRadius:12,padding:28,textAlign:"center",cursor:"pointer",minHeight:170,display:"flex",flexDirection:"column",justifyContent:"center",marginBottom:14,border:"2px dashed #E5E7EB" }}>
            <div style={{ fontSize:30,fontWeight:700,marginBottom:4 }}>{vcur.word}</div>
            <div style={{ fontSize:13,color:"#9CA3AF",marginBottom:12,fontStyle:"italic" }}>{vcur.pos}</div>
            {!revealed && <div style={{ fontSize:13,color:"#6B7280" }}>Tarifni korish uchun bosing</div>}
            {revealed && <>
              <div style={{ fontSize:15,color:"#374151",lineHeight:1.6,marginBottom:8 }}>{vcur.def}</div>
              <div style={{ fontSize:13,color:"#6B7280",fontStyle:"italic" }}>"{vcur.ex}"</div>
            </>}
          </div>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <button onClick={prevV} style={S.btn(false,false)}>Oldingi</button>
            <span style={{ fontSize:13,color:"#9CA3AF" }}>{vocabIdx+1} / {vset.length}</span>
            <button onClick={nextV} style={S.btn(false,false)}>Keyingi</button>
          </div>
        </div>
        <div style={S.card}>
          <div style={{ fontWeight:600,marginBottom:12 }}>Kategoriyalar</div>
          <div style={{ display:"flex",flexWrap:"wrap",gap:8 }}>
            {[["general","General"],["education","Education"],["environment","Environment"],["technology","Technology"],["health","Health"]].map(([c,l]) => (
              <button key={c} onClick={() => changeCat(c)} style={S.pBtn(vocabCat===c)}>{l}</button>
            ))}
          </div>
        </div>
        <div style={S.card}>
          <div style={{ fontWeight:600,marginBottom:10 }}>Organilgan sozlar: {learned.length} ta</div>
          {learned.length===0
            ? <div style={{ fontSize:13,color:"#9CA3AF" }}>Flashcardni oching — sozlar shu yerda saqlanadi.</div>
            : <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                {learned.map(w => <span key={w} style={{ fontSize:12,padding:"4px 10px",borderRadius:6,background:"#F0FDF4",color:"#166534",border:"1px solid #BBF7D0" }}>{w}</span>)}
              </div>
          }
        </div>
      </>}

      {/* HISTORY */}
      {tab==="history" && <>
        <div style={{ fontWeight:600,fontSize:16,marginBottom:14 }}>Saqlangan essalar</div>
        {[1,2].map(t => (
          <div key={t} style={S.card}>
            <div style={{ fontWeight:600,marginBottom:12 }}>Task {t} ({(writeSaved[t]||[]).length} ta)</div>
            {(writeSaved[t]||[]).length===0
              ? <div style={{ fontSize:13,color:"#9CA3AF" }}>Hali esse saqlanmagan. Writing qismida yozing va "Esse saqlash" ni bosing.</div>
              : (writeSaved[t]||[]).map((e,i) => (
                  <div key={i} style={{ borderBottom:i<writeSaved[t].length-1?"1px solid #F3F4F6":"none",paddingBottom:12,marginBottom:12 }}>
                    <div style={{ display:"flex",justifyContent:"space-between",marginBottom:6 }}>
                      <span style={{ fontSize:12,fontWeight:600,color:"#6B7280" }}>{e.date}</span>
                      <span style={{ fontSize:12,background:"#F0FDF4",color:"#166534",padding:"2px 8px",borderRadius:6 }}>{e.wc} soz</span>
                    </div>
                    <div style={{ fontSize:12,color:"#9CA3AF",marginBottom:6 }}>{e.topic}</div>
                    <div style={{ fontSize:13,color:"#374151",lineHeight:1.6,background:"#F9FAFB",borderRadius:8,padding:10,maxHeight:100,overflow:"auto" }}>{e.text}</div>
                  </div>
                ))
            }
          </div>
        ))}
        <div style={S.card}>
          <div style={{ fontWeight:600,marginBottom:10 }}>Umumiy statistika</div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
            {[{l:"Jami vazifalar",v:totalTasks},{l:"Organilgan sozlar",v:learned.length},{l:"Saqlangan essalar",v:(writeSaved[1]||[]).length+(writeSaved[2]||[]).length},{l:"Streak",v:`${streak} kun`}].map(m => (
              <div key={m.l} style={{ background:"#F9FAFB",borderRadius:10,padding:12 }}>
                <div style={{ fontSize:11,color:"#9CA3AF",marginBottom:4 }}>{m.l}</div>
                <div style={{ fontSize:22,fontWeight:700 }}>{m.v}</div>
              </div>
            ))}
          </div>
        </div>
      </>}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
